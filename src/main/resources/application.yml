spring:
  config:
    import:
      - optional:file:.env[.properties]

  application:
    name: cjp-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    region: ${AWS_REGION:us-east-1}
    bucket-name: ${AWS_S3_BUCKET}

app:
  resend:
    api-key: ${RESEND_API_KEY:${MAIL_PASSWORD:}}
  mail:
    from-email: ${MAIL_FROM:no-reply@email.jprado.site}
    from-name: ${MAIL_FROM_NAME:Clinica Javier Prado}
    verification-subject: ${MAIL_VERIFICATION_SUBJECT:CJP - Codigo de verificacion}
    welcome-subject: ${MAIL_WELCOME_SUBJECT:CJP - Bienvenido a Clinica Javier Prado}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  password-reset:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    path: ${PASSWORD_RESET_PATH:/reset-password}
    token-expiration-hours: ${PASSWORD_RESET_TOKEN_EXPIRATION_HOURS:1}
    mail-subject: ${MAIL_RESET_SUBJECT:CJP - Password Reset Request}
  email-verification:
    code-expiration-minutes: ${EMAIL_VERIFICATION_CODE_EXPIRATION_MINUTES:15}
